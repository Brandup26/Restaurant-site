<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المطعم</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; }
        h2 { color: #1a73e8; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>تحديث بيانات المطعم</h2>
    <input type="text" id="restName" placeholder="اسم المطعم">
    <input type="text" id="restLogo" placeholder="رابط اللوجو">
    <hr>
    <h3>تحديث الأسعار</h3>
    <input type="number" id="burgerPrice" placeholder="سعر البرجر">
    <input type="number" id="pizzaPrice" placeholder="سعر البيتزا">
    
    <button onclick="saveData()">حفظ البيانات وتحديث المنيو</button>
    <p id="status" style="text-align: center; color: green;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    // بياناتك اللي جبناها من Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة إرسال البيانات للسيرفر
    function saveData() {
        const name = document.getElementById('restName').value;
        const logo = document.getElementById('restLogo').value;
        const burger = document.getElementById('burgerPrice').value;
        const pizza = document.getElementById('pizzaPrice').value;

        // تخزين البيانات تحت اسم "restaurant_info"
        database.ref('restaurant_info').set({
            name: name,
            logo: logo,
            prices: {
                burger_price: burger,
                pizza_price: pizza
            }
        }).then(() => {
            document.getElementById('status').innerText = "✅ تم التحديث بنجاح!";
        });
    }
</script>
</body>
</html>
