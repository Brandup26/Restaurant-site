<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم النهائية - حل مشكلة الصور</title>
    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); padding: 15px; direction: rtl; text-align: center; }
        .box { background: #fff; max-width: 450px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .section { background: #fff; padding: 15px; border: 1px solid #e2e8f0; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; transition: 0.2s; margin-top: 10px; }
        .btn-p { background: var(--p); }
        .btn-s { background: var(--s); }
        #status { margin-top: 15px; font-weight: bold; color: #64748b; }
        .img-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; margin: 10px auto; display: none; border: 2px solid var(--p); }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#1e293b;">🚀 إدارة المنيو</h2>
    <div id="status">جاهز للرفع الفوري..</div>

    <div class="section">
        <h3>📍 إعدادات المطعم</h3>
        <input type="text" id="resName" placeholder="اسم المطعم">
        <input type="text" id="resWhatsapp" placeholder="رقم الواتساب">
        <label>صورة اللوجو:</label>
        <input type="file" id="logoFile" accept="image/*" onchange="preview(this, 'p1')">
        <img id="p1" class="img-preview">
        <button class="btn-p" onclick="saveSettings()">حفظ اللوجو والبيانات</button>
    </div>

    <div class="section">
        <h3>🍔 إضافة صنف جديد</h3>
        <input type="text" id="itemName" placeholder="اسم الأكلة">
        <input type="number" id="itemPrice" placeholder="السعر">
        <label>صورة الأكلة:</label>
        <input type="file" id="itemFile" accept="image/*" onchange="preview(this, 'p2')">
        <img id="p2" class="img-preview">
        <button class="btn-s" id="addBtn" onclick="addItem()">إضافة الصنف للمنيو</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة عبقرية لتصغير الصورة جداً عشان تترفع في ثانية
    async function compressAndProcess(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // صغرنا الحجم لـ 400 بكسل (مثالي للموبايل)
                    const size = 400; 
                    let w = img.width, h = img.height;
                    if (w > h) { h *= size/w; w = size; } else { w *= size/h; h = size; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    // جودة 0.5 عشان الحجم يبقى ريشة
                    resolve(canvas.toDataURL('image/jpeg', 0.5));
                }
            }
        });
    }

    function preview(input, id) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveSettings() {
        const status = document.getElementById('status');
        const file = document.getElementById('logoFile').files[0];
        status.innerText = "⏳ جاري حفظ اللوجو...";
        let logoData = file ? await compressAndProcess(file) : null;
        const updates = {
            name: document.getElementById('resName').value,
            whatsapp: document.getElementById('resWhatsapp').value
        };
        if(logoData) updates.logo = logoData;
        db.ref('restaurant_info').update(updates).then(() => {
            status.innerText = "✅ تم حفظ بيانات المطعم!";
        });
    }

    async function addItem() {
        const status = document.getElementById('status');
        const btn = document.getElementById('addBtn');
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const file = document.getElementById('itemFile').files[0];

        if(!name || !price) return alert("اكتب الاسم والسعر!");

        btn.disabled = true;
        status.innerText = "⏳ جاري الرفع الفوري...";
        
        let imgData = file ? await compressAndProcess(file) : "";

        // التأكد إن الصورة مش ضخمة قبل الإرسال
        db.ref('menu_items').push({
            name: name,
            price: price,
            image: imgData
        }).then(() => {
            status.innerText = "✅ تم إضافة " + name + " للمنيو!";
            btn.disabled = false;
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
            document.getElementById('itemFile').value = "";
            document.getElementById('p2').style.display = 'none';
        }).catch((err) => {
            status.innerText = "❌ فشل الرفع: الصورة لسه كبيرة";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
