<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المطعم</title>
    <style>
        :root { --blue: #1a73e8; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--blue); }
        .section { background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .add-btn { background: #34a853; margin-top: 10px; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إعدادات المطعم</h2>
    
    <div class="section">
        <label>اسم المطعم</label>
        <input type="text" id="resName" placeholder="مثلاً: مطعم البركة">
        <label>رابط اللوجو (URL)</label>
        <input type="text" id="resLogo" placeholder="ضع رابط الصورة من ImgBB هنا">
        <label>رقم واتساب الطلبات</label>
        <input type="text" id="resWhatsapp" placeholder="2010xxxxxxxx">
        <button onclick="saveBasicInfo()">حفظ البيانات الأساسية</button>
    </div>

    <div class="section">
        <h3>🍔 إضافة صنف جديد</h3>
        <input type="text" id="itemName" placeholder="اسم الأكلة">
        <input type="number" id="itemPrice" placeholder="السعر">
        <button class="add-btn" onclick="addNewItem()">إضافة الصنف للمنيو</button>
    </div>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveBasicInfo() {
        db.ref('restaurant_info').update({
            name: document.getElementById('resName').value,
            logo: document.getElementById('resLogo').value,
            whatsapp: document.getElementById('resWhatsapp').value
        }).then(() => { document.getElementById('status').innerText = "✅ تم حفظ الإعدادات!"; });
    }

    function addNewItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        if (name && price) {
            db.ref('menu_items').push({ name: name, price: price }).then(() => {
                document.getElementById('status').innerText = "✅ تم إضافة " + name;
                document.getElementById('itemName').value = "";
                document.getElementById('itemPrice').value = "";
            });
        }
    }
</script>
</body>
</html>
