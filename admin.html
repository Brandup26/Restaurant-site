<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الخارقة</title>
    <style>
        :root { --primary: #000; --accent: #ff4757; --bg: #f1f2f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; direction: rtl; text-align: center; }
        .box { background: #fff; max-width: 450px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { background: #fafafa; padding: 15px; border-radius: 15px; border: 2px dashed #ddd; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; background: var(--primary); color: #fff; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 20px; font-weight: bold; padding: 10px; color: #555; border-radius: 8px; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color: var(--accent);">🚀 نظام الإدارة الفوري</h2>
    
    <div class="card">
        <input type="text" id="resName" placeholder="اسم المطعم">
        <input type="text" id="resWhatsapp" placeholder="رقم الواتساب">
        <button onclick="saveInfo()">1. حفظ البيانات الأساسية</button>
    </div>

    <div class="card">
        <label><b>اللوجو أو صورة الصنف</b></label>
        <input type="file" id="anyFile" accept="image/*">
        <p style="font-size: 12px; color: #888;">* هيرفع أي صورة مهما كان حجمها</p>
        
        <div style="display: flex; gap: 10px;">
            <button style="background: #2f3542;" onclick="uploadSmart('logo')">تحديث اللوجو</button>
            <button style="background: #2ed573;" onclick="uploadSmart('item')">إضافة كصنف</button>
        </div>
    </div>

    <div id="itemFields" style="display: none;" class="card">
        <input type="text" id="itemName" placeholder="اسم الأكلة">
        <input type="number" id="itemPrice" placeholder="السعر">
        <button onclick="finalAddItem()">تأكيد إضافة الصنف</button>
    </div>

    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastUploadedUrl = "";

    async function uploadSmart(type) {
        const file = document.getElementById('anyFile').files[0];
        if (!file) return alert("اختار صورة أولاً!");
        
        const status = document.getElementById('status');
        status.innerText = "⌛ جاري الرفع فوراً.. متقفلش الصفحة";
        status.className = "loading";

        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", "menu_preset"); // بريسيت مفتوح المساحة

        try {
            // استخدام سيرفر Cloudinary - الأقوى عالمياً في التعامل مع الصور الكبيرة
            const res = await fetch("https://api.cloudinary.com/v1_1/dno6v8vub/image/upload", {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            
            if (data.secure_url) {
                lastUploadedUrl = data.secure_url;
                if (type === 'logo') {
                    db.ref('restaurant_info').update({ logo: lastUploadedUrl }).then(() => {
                        status.innerText = "✅ تم تحديث اللوجو بنجاح!";
                        status.className = "";
                    });
                } else {
                    document.getElementById('itemFields').style.display = "block";
                    status.innerText = "✅ الصورة اترفع! كمل بيانات الصنف تحت";
                    status.className = "";
                }
            } else {
                throw new Error();
            }
        } catch (e) {
            status.innerText = "❌ السيرفر مشغول، حاول مرة تانية";
            status.className = "";
        }
    }

    function finalAddItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        if(!name || !price) return alert("اكتب الاسم والسعر!");

        db.ref('menu_items').push({ name, price, image: lastUploadedUrl }).then(() => {
            document.getElementById('status').innerText = "✅ الصنف انضاف للمنيو!";
            document.getElementById('itemFields').style.display = "none";
            document.getElementById('itemName').value = "";
            document.getElementById('itemPrice').value = "";
        });
    }

    function saveInfo() {
        const name = document.getElementById('resName').value;
        const whatsapp = document.getElementById('resWhatsapp').value;
        db.ref('restaurant_info').update({ name, whatsapp }).then(() => {
            alert("تم حفظ الاسم والرقم!");
        });
    }
</script>
</body>
</html>
