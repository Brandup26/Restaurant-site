<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم السريعة</title>
    <style>
        :root { --blue: #007bff; --green: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; direction: rtl; }
        .card { background: white; max-width: 480px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid #e9ecef; border-radius: 12px; background: #fff; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        h3 { color: var(--blue); margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 16px; }
        .btn-blue { background: var(--blue); }
        .btn-blue:hover { background: #0056b3; }
        .btn-green { background: var(--green); }
        .btn-green:hover { background: #218838; }
        .btn-gray { background: #6c757d; margin-top: 10px; }
        .btn-gray:hover { background: #5a6268; }
        #status { margin-top: 20px; font-weight: bold; color: #555; text-align: center; padding: 10px; border-radius: 8px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        .file-input { background: #f8f9fa; border: 1px dashed #ddd; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ لوحة تحكم المنيو</h2>
    
    <div class="section">
        <h3>📍 بيانات المطعم</h3>
        <label>اسم المطعم في الواجهة</label>
        <input type="text" id="resName" placeholder="مثال: مطعم البركة">
        <label>رقم واتساب الطلبات</label>
        <input type="text" id="resWhatsapp" placeholder="مثال: 2010xxxxxxxx">
        <button class="btn-blue" onclick="saveTextData()">حفظ الاسم والرقم</button>
    </div>

    <div class="section">
        <h3>🖼️ لوجو الواجهة</h3>
        <label>اختر صورة اللوجو (يفضل مساحة معقولة)</label>
        <input type="file" id="logoFile" accept="image/*" class="file-input">
        <button class="btn-gray" onclick="uploadLogoOnly()">رفع وتحديث اللوجو</button>
    </div>

    <div class="section">
        <h3>🍔 إضافة صنف جديد</h3>
        <label>اسم الأكلة</label>
        <input type="text" id="itemName" placeholder="مثال: برجر دجاج">
        <label>السعر (ج.م)</label>
        <input type="number" id="itemPrice" placeholder="مثال: 150">
        <label>صورة الصنف (اختياري)</label>
        <input type="file" id="itemFile" accept="image/*" class="file-input">
        <button class="btn-green" onclick="uploadAndAddItem()">إضافة الصنف للمنيو</button>
    </div>

    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const statusDiv = document.getElementById('status');

    // الدالة الجديدة للرفع على سيرفر سريع (ImageKit)
    async function uploadToImageKit(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("fileName", file.name);
        // ده مفتاح عام (Public Key) للسيرفر الجديد
        formData.append("publicKey", "public_v1_k1R9b/1N4vD7L+6o5uR2mU="); 

        try {
            const res = await fetch("https://upload.imagekit.io/api/v1/files/upload", {
                method: "POST",
                body: formData
            });
            const json = await res.json();
            if(res.ok) {
                return json.url; // الرابط المباشر
            } else {
                return null;
            }
        } catch (err) {
            return null;
        }
    }

    // حفظ النصوص
    function saveTextData() {
        const name = document.getElementById('resName').value;
        const whatsapp = document.getElementById('resWhatsapp').value;
        statusDiv.innerText = "⏳ جاري حفظ البيانات...";
        statusDiv.style.color = "#555";
        db.ref('restaurant_info').update({ name, whatsapp })
          .then(() => { 
              statusDiv.innerText = "✅ تم حفظ الاسم والرقم!"; 
              statusDiv.style.color = "green";
          });
    }

    // رفع اللوجو بالسيرفر الجديد
    async function uploadLogoOnly() {
        const file = document.getElementById('logoFile').files[0];
        if (!file) return alert("اختار صورة اللوجو الأول!");
        
        statusDiv.innerText = "⏳ جاري رفع اللوجو.. قد يستغرق وقتاً حسب حجم الصورة";
        statusDiv.style.color = "#555";
        
        // جرب نرفع على السيرفر الجديد
        let url = await uploadToImageKit(file);
        
        if (url) {
            db.ref('restaurant_info').update({ logo: url })
              .then(() => { 
                  statusDiv.innerText = "✅ تم تحديث اللوجو بنجاح!"; 
                  statusDiv.style.color = "green";
              });
        } else {
            statusDiv.innerText = "❌ فشل الرفع، جرب صورة أصغر أو حاول لاحقاً";
            statusDiv.style.color = "red";
        }
    }

    // إضافة صنف مع صورته بالسيرفر الجديد
    async function uploadAndAddItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const file = document.getElementById('itemFile').files[0];

        if (!name || !price) return alert("اكتب الاسم والسعر!");

        statusDiv.innerText = "⏳ جاري إضافة الصنف...";
        statusDiv.style.color = "#555";
        
        let url = "";
        if (file) url = await uploadToImageKit(file);

        db.ref('menu_items').push({ name, price, image: url })
          .then(() => {
              statusDiv.innerText = "✅ تم إضافة " + name;
              statusDiv.style.color = "green";
              document.getElementById('itemName').value = "";
              document.getElementById('itemPrice').value = "";
              document.getElementById('itemFile').value = ""; // مسح اختيار الملف
          });
    }
</script>
</body>
</html>
