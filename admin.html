<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <style>
        :root { --p: #2563eb; --s: #10b981; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); padding: 15px; direction: rtl; text-align: center; }
        .box { background: #fff; max-width: 450px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .section { background: #fff; padding: 15px; border: 1px solid #e2e8f0; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #fff; transition: 0.2s; margin-top: 10px; }
        .btn-p { background: var(--p); }
        .btn-s { background: var(--s); }
        #status { margin-top: 15px; font-weight: bold; color: #64748b; }
        .img-preview { width: 150px; height: 150px; object-fit: cover; border-radius: 10px; margin: 10px auto; display: none; border: 3px solid var(--s); }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#1e293b;">🚀 إدارة المنيو الذكية</h2>
    <div id="status">جاهز للعمل..</div>

    <div class="section">
        <h3>📍 إعدادات المطعم</h3>
        <input type="text" id="resName" placeholder="اسم المطعم">
        <input type="text" id="resWhatsapp" placeholder="رقم الواتساب">
        <button class="btn-p" onclick="saveSettings()">حفظ البيانات الأساسية</button>
    </div>

    <div class="section">
        <h3>🍔 إضافة صنف جديد</h3>
        <input type="text" id="itemName" placeholder="اسم الأكلة">
        <input type="number" id="itemPrice" placeholder="السعر">
        <label>اختر صورة الأكلة:</label>
        <input type="file" id="itemFile" accept="image/*" onchange="preview(this)">
        <img id="p2" class="img-preview">
        <button class="btn-s" id="addBtn" onclick="uploadAndAdd()">إضافة الصنف للمنيو</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function preview(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                const img = document.getElementById('p2');
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function uploadAndAdd() {
        const status = document.getElementById('status');
        const btn = document.getElementById('addBtn');
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const file = document.getElementById('itemFile').files[0];

        if(!name || !price || !file) return alert("اكمل البيانات واختار صورة!");

        btn.disabled = true;
        status.innerText = "⏳ جاري رفع الصورة.. خليك معايا";

        // الرفع لـ ImgBB باستخدام API Key الخاص بك
        const formData = new FormData();
        formData.append("image", file);

        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key=6f8905e324c538a4208e67f08d32788e", {
                method: "POST",
                body: formData
            });
            const data = await res.json();

            if (data.success) {
                const imgUrl = data.data.url;
                // بعد الرفع بنجاح.. نحفظ الرابط في Firebase
                db.ref('menu_items').push({
                    name: name,
                    price: price,
                    image: imgUrl
                }).then(() => {
                    status.innerText = "✅ تم إضافة " + name + " بنجاح!";
                    btn.disabled = false;
                    document.getElementById('itemName').value = "";
                    document.getElementById('itemPrice').value = "";
                    document.getElementById('p2').style.display = 'none';
                });
            } else {
                throw new Error();
            }
        } catch (e) {
            status.innerText = "❌ فشل الرفع.. جرب صورة تانية";
            btn.disabled = false;
        }
    }

    function saveSettings() {
        const name = document.getElementById('resName').value;
        const whatsapp = document.getElementById('resWhatsapp').value;
        db.ref('restaurant_info').update({ name, whatsapp }).then(() => {
            alert("✅ تم حفظ البيانات الأساسية!");
        });
    }
</script>
</body>
</html>
