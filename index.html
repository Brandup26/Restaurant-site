<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #e67e22; --dark-bg: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514326640560-7d063ef2aed5?auto=format&fit=crop&w=800&q=80'); background-size: cover; border-radius: 15px; margin-bottom: 30px; border-bottom: 4px solid var(--primary-color); }
        .menu-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .menu-item { background: #262626; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; border-right: 4px solid transparent; }
        .menu-item:hover { border-right: 4px solid var(--primary-color); background: #333; }
        .item-info h3 { margin: 0; color: var(--primary-color); }
        .item-info p { margin: 5px 0 0; font-size: 0.9em; color: #ccc; }
        .price-tag { background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; min-width: 80px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>مطعم زكريا</h1>
        <p>أشهى المأكولات بجودة عالمية</p>
    </div>

    <div class="menu-section">
        <div class="menu-item">
            <div class="item-info">
                <h3>برجر كلاسيك</h3>
                <p>لحم بقري مشوي، خس، طماطم، صوص خاص</p>
            </div>
            <div class="price-tag" id="burger_price">جارِ التحميل...</div>
        </div>

        <div class="menu-item">
            <div class="item-info">
                <h3>بيتزا إيطالي</h3>
                <p>عجينة رقيقة، صلصة طماطم، موزاريلا فريش</p>
            </div>
            <div class="price-tag" id="pizza_price">جارِ التحميل...</div>
        </div>

        <div class="menu-item">
            <div class="item-info">
                <h3>باستا فرن</h3>
                <p>مكرونة بالبشاميل واللحم المفروم</p>
            </div>
            <div class="price-tag" id="pasta_price">جارِ التحميل...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // بيانات الربط الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
            authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
            databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
            projectId: "restaurant-menu-1bfd7",
            storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
            messagingSenderId: "626018942432",
            appId: "1:626018942432:web:0e0169b3c071867b713f85"
        };

        // بدء التشغيل
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // دالة مراقبة الأسعار: أي تغيير في فايربيز هيسمع هنا فوراً
        function watchPrices() {
            const pricesRef = database.ref('prices');
            pricesRef.on('value', (snapshot) => {
                const prices = snapshot.val();
                if (prices) {
                    // تحديث العناصر بناءً على الـ ID
                    if (prices.burger_price) document.getElementById('burger_price').innerText = prices.burger_price + " LE";
                    if (prices.pizza_price) document.getElementById('pizza_price').innerText = prices.pizza_price + " LE";
                    if (prices.pasta_price) document.getElementById('pasta_price').innerText = prices.pasta_price + " LE";
                }
            });
        }

        watchPrices();
    </script>
</body>
</html>
