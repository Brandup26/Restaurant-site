<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أولاد أنس - المنيو الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f27e27; --dark: #0f0f0f; --card: #1a1a1a; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: var(--white); overflow-x: hidden; width: 100%; }

        /* واجهة الزبون */
        header { text-align: center; padding: 30px 15px; border-bottom: 3px solid var(--primary); }
        .logo-box { width: 100px; height: 100px; background: #fff; border-radius: 50%; margin: 0 auto 15px; overflow: hidden; border: 3px solid var(--primary); }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .section-title { color: var(--primary); margin: 25px 20px 10px; border-right: 4px solid var(--primary); padding-right: 10px; font-size: 20px; }
        .menu-list { padding: 0 15px; max-width: 600px; margin: auto; }
        .menu-card { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; cursor: pointer; transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.96); border-color: var(--primary); }
        .price-tag { color: var(--primary); font-weight: 900; font-size: 19px; }

        /* زر الإرسال الثابت */
        .order-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #25d366; color: white;
            padding: 18px; text-align: center; font-weight: 900; cursor: pointer;
            display: none; z-index: 1000; font-size: 18px;
        }

        /* لوحة التحكم - تعديل عرض الموبايل */
        .admin-view { background: #f8f9fa; color: #333; padding: 30px 10px; border-top: 5px solid var(--primary); margin-top: 40px; }
        .admin-card { max-width: 100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; display: block; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="clientView">
        <header>
            <div class="logo-box"><img id="viewLogo" src="https://via.placeholder.com/100" alt="Logo"></div>
            <h1 id="viewName">أولاد زكريا</h1>
            <p id="viewSlogan" style="color:#888">أجمد كشري وطواجن في مصر</p>
        </header>

        <h2 class="section-title">قسم الكشري</h2>
        <div class="menu-list" id="kosharyList"></div>

        <h2 class="section-title">قسم الطواجن</h2>
        <div class="menu-list" id="tagnList"></div>

        <h2 class="section-title">قسم الحواوشي</h2>
        <div class="menu-list" id="hawashiList"></div>
    </div>

    <div class="admin-view">
        <div class="admin-card">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px">⚙️ لوحة التحكم الشاملة</h2>
            <div class="input-group">
                <label>اسم المطعم:</label>
                <input type="text" id="editName" value="أولاد زكريا">
            </div>
            <div class="input-group">
                <label>رقم واتساب المطعم:</label>
                <input type="tel" id="editPhone" value="01022101718">
            </div>
            <div class="input-group">
                <label>تغيير اللوجو:</label>
                <input type="file" accept="image/*" onchange="updateLogo(event)">
            </div>
            <button class="save-btn" onclick="applyChanges()">حفظ البيانات وتحديث المنيو ✅</button>
        </div>
    </div>

    <div class="order-bar" id="orderBar" onclick="sendOrder()">
        إرسال الطلب (الإجمالي: <span id="total">0</span> ج)
    </div>

    <script>
        const menuData = {
            koshary: [
                {n: "كشري النخبة (سوبر)", p: 55}, {n: "كشري القمة (كبير)", p: 45},
                {n: "كشري وسط", p: 35}, {n: "كشري صغير", p: 25}
            ],
            tagn: [
                {n: "طاجن فراخ ميكس جبن", p: 65}, {n: "طاجن لحمة موزة", p: 60},
                {n: "طاجن كبدة إسكندراني", p: 50}
            ],
            hawashi: [
                {n: "حواوشي إسكندراني كبير", p: 45}, {n: "حواوشي دبل جبنة", p: 55}
            ]
        };

        let cart = [];
        let total = 0;

        function renderMenu() {
            renderSection('kosharyList', menuData.koshary);
            renderSection('tagnList', menuData.tagn);
            renderSection('hawashiList', menuData.hawashi);
        }

        function renderSection(id, items) {
            const list = document.getElementById(id);
            list.innerHTML = '';
            items.forEach(item => {
                list.innerHTML += `
                <div class="menu-card" onclick="addToCart('${item.n}', ${item.p})">
                    <span>${item.n}</span>
                    <span class="price-tag">${item.p}ج</span>
                </div>`;
            });
        }

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            document.getElementById('orderBar').style.display = 'block';
            document.getElementById('total').innerText = total;
        }

        function updateLogo(e) {
            const reader = new FileReader();
            reader.onload = () => document.getElementById('viewLogo').src = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        function applyChanges() {
            document.getElementById('viewName').innerText = document.getElementById('editName').value;
            alert("تم التحديث! المنيو الآن يحتوي على كافة الأصناف.");
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function sendOrder() {
            const phone = document.getElementById('editPhone').value;
            const msg = `*طلب جديد من ${document.getElementById('viewName').innerText}*%0A*الطلبات:* ${cart.join(' + ')}%0A*الإجمالي:* ${total}ج`;
            window.open(`https://wa.me/2${phone}?text=${msg}`);
        }

        renderMenu();
    </script>
</body>
</html>
