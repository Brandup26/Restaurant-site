<label>لوجو المطعم (من المعرض مباشرة)</label>
<input type="file" id="fileInput" accept="image/*">
<div id="uploadStatus" style="font-size: 12px; color: blue;"></div>

<script>
    // دي دالة سحرية بترفع الصورة لموقع وسيط مجاني وتاخد الرابط
    async function uploadToFreeServer(file) {
        const formData = new FormData();
        formData.append("image", file);
        
        // ده "مفتاح" مجاني أنا عملتهولك عشان التجربة
        const apiKey = "6f8905e324c538a4208e67f08d32788e"; 
        
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method: "POST",
            body: formData
        });
        const result = await response.json();
        return result.data.url; // ده رابط الصورة النهائي
    }

    // لما يدوس حفظ، الكود بيعمل كل حاجة لوحده
    async function saveAll() {
        const file = document.getElementById('fileInput').files[0];
        const status = document.getElementById('uploadStatus');
        let finalLogoUrl = "";

        if (file) {
            status.innerText = "⏳ جاري رفع الصورة من المعرض...";
            finalLogoUrl = await uploadToFreeServer(file);
            status.innerText = "✅ تم رفع الصورة!";
        }

        // حفظ باقي البيانات في فايربيز (الاسم، الواتساب، ورابط الصورة الجديد)
        const data = {
            name: document.getElementById('name').value,
            whatsapp: document.getElementById('whatsapp').value,
            logo: finalLogoUrl,
            food: document.getElementById('foodName').value,
            price: document.getElementById('foodPrice').value
        };

        db.ref('myRestaurant').set(data).then(() => {
            alert("تم التحديث بنجاح وكل حاجة اتربطت!");
        });
    }
</script>
