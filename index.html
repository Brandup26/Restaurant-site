<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم النخبة - أطلب الآن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #f2b705; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px; }
        header { text-align: center; padding: 40px; background: linear-gradient(45deg, #000, #222); border-bottom: 2px solid var(--gold); }
        .categories { display: flex; gap: 10px; padding: 15px; overflow-x: auto; sticky: top; background: var(--bg); }
        .cat-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--gold); color: #000; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .item-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; }
        .item-img { width: 100%; height: 120px; object-fit: cover; }
        .item-info { padding: 10px; }
        .item-title { font-size: 1rem; margin: 0; }
        .price { color: var(--gold); font-weight: bold; display: block; margin: 5px 0; }
        .add-btn { background: var(--gold); border: none; width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* سلة المشتريات العائمة */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid var(--gold); z-index: 1000; }
        .view-cart { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }

        /* نافذة الفورم */
        #order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .confirm-btn { background: #25d366; color: white; width: 100%; border: none; padding: 15px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="لوجو المطعم" style="height: 80px; margin-bottom: 10px;">
    <h1>مطعم النخبة</h1>
    <p>كريبات • بروست • بوكسات</p>
</header>

<div class="categories">
    <button class="cat-btn active">الكل</button>
    <button class="cat-btn">كريبات</button>
    <button class="cat-btn">بروست</button>
    <button class="cat-btn">بوكسات</button>
</div>

<div class="menu-grid" id="menu">
    <div class="item-card" data-category="كريبات">
        <img src="https://images.unsplash.com/photo-1519676867240-f031ee04a703?w=400" class="item-img">
        <div class="item-info">
            <h3 class="item-title">كريب زنجر سوبر</h3>
            <span class="price">120 ج.م</span>
            <button class="add-btn" onclick="addToCart('كريب زنجر سوبر', 120)">إضافة للطلب</button>
        </div>
    </div>
    <div class="item-card" data-category="بروست">
        <img src="https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=400" class="item-img">
        <div class="item-info">
            <h3 class="item-title">وجبة بروست 4 قطع</h3>
            <span class="price">250 ج.م</span>
            <button class="add-btn" onclick="addToCart('وجبة بروست 4 قطع', 250)">إضافة للطلب</button>
        </div>
    </div>
</div>

<div class="cart-bar" id="cart-bar" style="display: none;">
    <div>الطلبات: <span id="cart-count">0</span> | الإجمالي: <span id="cart-total">0</span> ج.م</div>
    <button class="view-cart" onclick="showModal()">تأكيد الطلب</button>
</div>

<div id="order-modal">
    <div class="modal-content">
        <h2 style="color:var(--gold)">بيانات التوصيل</h2>
        <div id="order-summary" style="margin-bottom: 15px; font-size: 0.9rem; border-bottom: 1px solid #333; padding-bottom: 10px;"></div>
        <input type="text" id="cust-name" placeholder="اسمك الكريم">
        <input type="tel" id="cust-phone" placeholder="رقم الموبايل">
        <textarea id="cust-address" placeholder="عنوان التوصيل بالتفصيل"></textarea>
        <button class="confirm-btn" onclick="sendToWhatsApp()">
            <i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب
        </button>
        <button onclick="hideModal()" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({name, price});
        total += price;
        updateCartBar();
    }

    function updateCartBar() {
        document.getElementById('cart-bar').style.display = 'flex';
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total').innerText = total;
    }

    function showModal() {
        document.getElementById('order-modal').style.display = 'block';
        let summary = "طلباتك: " + cart.map(i => i.name).join(' ، ');
        document.getElementById('order-summary').innerText = summary;
    }

    function hideModal() {
        document.getElementById('order-modal').style.display = 'none';
    }

    function sendToWhatsApp() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = document.getElementById('cust-address').value;
        
        if(!name || !phone || !address) {
            alert("برجاء ملء كافة البيانات");
            return;
        }

        let itemsText = cart.map(i => `- ${i.name} (${i.price} ج.م)`).join('%0A');
        let message = `*طلب جديد من المنيو الإلكتروني*%0A%0A` +
                      `*الاسم:* ${name}%0A` +
                      `*الموبايل:* ${phone}%0A` +
                      `*العنوان:* ${address}%0A%0A` +
                      `*الطلبات:*%0A${itemsText}%0A%0A` +
                      `*الإجمالي:* ${total} ج.م`;

        const whatsappNumber = "201019482687"; // ضع رقم المطعم هنا
        window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
