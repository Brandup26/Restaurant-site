<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أولاد زكريا - الإدارة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f27e27; --dark: #0b0b0b; --card: #181818; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: #fff; }

        /* واجهة الزبون */
        header { text-align: center; padding: 30px; border-bottom: 3px solid var(--primary); }
        .section-title { color: var(--primary); padding: 15px 20px; font-size: 20px; border-right: 4px solid var(--primary); margin: 20px 10px; }
        .menu-item { background: var(--card); margin: 10px 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .price { color: var(--primary); font-weight: 900; font-size: 1.2rem; }

        /* لوحة التحكم (الإدارة) */
        .admin-panel { background: #fdfdfd; color: #333; padding: 30px 15px; border-top: 6px solid var(--primary); margin-top: 50px; }
        .admin-card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .price-edit-grid { display: grid; grid-template-columns: 1fr 100px; gap: 10px; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 14px; }
        input { padding: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-weight: bold; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="clientView">
        <header>
            <h1 id="viewName">أولاد زكريا</h1>
            <p style="color:#888">قائمة الطعام الرسمية</p>
        </header>

        <h2 class="section-title">علب الكشري</h2>
        <div class="menu-item"><span>كشري النخبة (سوبر)</span><span class="price"><span id="p1_val">55</span>ج</span></div>
        <div class="menu-item"><span>كشري القمة (كبير)</span><span class="price"><span id="p2_val">45</span>ج</span></div>
        <div class="menu-item"><span>كشري زكريا (وسط)</span><span class="price"><span id="p3_val">35</span>ج</span></div>

        <h2 class="section-title">طواجن الفرن</h2>
        <div class="menu-item"><span>طاجن فراخ ميكس جبن</span><span class="price"><span id="p4_val">70</span>ج</span></div>
        <div class="menu-item"><span>طاجن لحمة موزة</span><span class="price"><span id="p5_val">65</span>ج</span></div>

        <h2 class="section-title">الحواوشي</h2>
        <div class="menu-item"><span>حواوشي مخصوص</span><span class="price"><span id="p6_val">50</span>ج</span></div>
    </div>

    <div class="admin-panel">
        <div class="admin-card">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px">⚙️ تعديل أسعار المنيو</h2>
            
            <div class="price-edit-grid">
                <label>كشري النخبة (سوبر):</label>
                <input type="number" id="p1_edit" value="55">
            </div>
            <div class="price-edit-grid">
                <label>كشري القمة (كبير):</label>
                <input type="number" id="p2_edit" value="45">
            </div>
            <div class="price-edit-grid">
                <label>كشري زكريا (وسط):</label>
                <input type="number" id="p3_edit" value="35">
            </div>
            <div class="price-edit-grid">
                <label>طاجن فراخ ميكس:</label>
                <input type="number" id="p4_edit" value="70">
            </div>
            <div class="price-edit-grid">
                <label>طاجن لحمة موزة:</label>
                <input type="number" id="p5_edit" value="65">
            </div>
            <div class="price-edit-grid">
                <label>حواوشي مخصوص:</label>
                <input type="number" id="p6_edit" value="50">
            </div>

            <button class="btn-save" onclick="savePrices()">حفظ الأسعار الجديدة وتحديث المنيو ✅</button>
        </div>
    </div>

    <script>
        function savePrices() {
            // ربط كل خانة تعديل بالرقم اللي بيظهر للزبون فوق
            document.getElementById('p1_val').innerText = document.getElementById('p1_edit').value;
            document.getElementById('p2_val').innerText = document.getElementById('p2_edit').value;
            document.getElementById('p3_val').innerText = document.getElementById('p3_edit').value;
            document.getElementById('p4_val').innerText = document.getElementById('p4_edit').value;
            document.getElementById('p5_val').innerText = document.getElementById('p5_edit').value;
            document.getElementById('p6_val').innerText = document.getElementById('p6_edit').value;

            alert("تم تحديث كافة الأسعار بنجاح! جرب تبص على المنيو فوق.");
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
