<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المطعم | زكريا</title>
    <style>
        :root { --main-blue: #1a73e8; --bg-gray: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-container { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--main-blue); text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--main-blue); outline: none; }
        button { width: 100%; padding: 15px; background: var(--main-blue); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1557b0; transform: translateY(-2px); }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>⚙️ لوحة تحكم المطعم</h2>
    
    <div class="input-group">
        <label>اسم المطعم</label>
        <input type="text" id="restName" placeholder="مثلاً: مطعم زكريا للمشويات">
    </div>

    <div class="input-group">
        <label>رابط اللوجو (URL)</label>
        <input type="text" id="restLogo" placeholder="ضع رابط صورة اللوجو هنا">
    </div>

    <hr style="border: 1px solid #eee; margin: 20px 0;">

    <div class="input-group">
        <label>سعر البرجر (LE)</label>
        <input type="number" id="burgerPrice" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>سعر البيتزا (LE)</label>
        <input type="number" id="pizzaPrice" placeholder="0.00">
    </div>

    <button onclick="saveToFirebase()">تحديث المنيو الآن</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function saveToFirebase() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "⏳ جاري الحفظ...";
        statusDiv.style.color = "orange";

        const data = {
            name: document.getElementById('restName').value,
            logo: document.getElementById('restLogo').value,
            burger: document.getElementById('burgerPrice').value,
            pizza: document.getElementById('pizzaPrice').value
        };

        database.ref('myRestaurant').set(data)
        .then(() => {
            statusDiv.innerText = "✅ تم تحديث بياناتك بنجاح!";
            statusDiv.style.color = "green";
        })
        .catch((error) => {
            statusDiv.innerText = "❌ خطأ في الاتصال بالسيرفر";
            statusDiv.style.color = "red";
        });
    }
</script>

</body>
</html>
