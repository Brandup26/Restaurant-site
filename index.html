<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المنيو الاحترافي | SaaS Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f27e27; --dark: #121212; --card: #1e1e1e; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: var(--white); }

        /* --- واجهة الزبون (المنيو) --- */
        .client-view { border: 5px solid #333; border-radius: 20px; margin: 20px; padding-bottom: 50px; background: var(--dark); min-height: 600px; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(rgba(0,0,0,0.7), var(--dark)); border-bottom: 2px solid var(--primary); }
        .logo-circle { width: 100px; height: 100px; background: #fff; border-radius: 50%; margin: 0 auto 15px; overflow: hidden; border: 3px solid var(--primary); }
        .logo-circle img { width: 100%; height: 100%; object-fit: contain; }
        
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .price { color: var(--primary); font-weight: 900; font-size: 20px; }

        /* --- لوحة تحكم صاحب المطعم (الأدمن) --- */
        .admin-panel { background: #f8f9fa; color: #333; padding: 30px; margin-top: 50px; border-top: 10px solid var(--primary); }
        .admin-title { color: var(--primary); font-weight: 900; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-apply { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; margin-top: 20px; }
        .btn-apply:hover { background: #d66a1a; }
        
        .badge-admin { background: #000; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 12px; float: left; }
    </style>
</head>
<body>

    <div class="client-view">
        <header>
            <div class="logo-circle">
                <img id="viewLogo" src="https://via.placeholder.com/100" alt="Logo">
            </div>
            <h1 id="viewName">اسم المطعم</h1>
            <p id="viewSlogan" style="color: #aaa;">أهلاً بكم في مطعمنا</p>
        </header>

        <div class="container">
            <h2 style="margin-bottom: 15px; color: var(--primary);">المنيو الأكثر طلباً</h2>
            <div class="item">
                <span id="viewItem1">كشري سبيشيال</span>
                <span class="price" id="viewPrice1">50ج</span>
            </div>
            <div class="item">
                <span id="viewItem2">طاجن فراخ ميكس</span>
                <span class="price" id="viewPrice2">65ج</span>
            </div>
        </div>
    </div>

    <div class="admin-panel">
        <span class="badge-admin">Dashboard v1.0</span>
        <h2 class="admin-title">لوحة تحكم صاحب المطعم (الإدارة)</h2>
        
        <div class="admin-grid">
            <div class="form-group">
                <label>اسم المطعم:</label>
                <input type="text" id="editName" value="أولاد زكريا">
            </div>
            <div class="form-group">
                <label>وصف مختصر (Slogan):</label>
                <input type="text" id="editSlogan" value="أصل الكشري والطواجن">
            </div>
            <div class="form-group">
                <label>سعر الكشري:</label>
                <input type="number" id="editPrice1" value="50">
            </div>
            <div class="form-group">
                <label>سعر الطاجن:</label>
                <input type="number" id="editPrice2" value="65">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>رابط اللوجو (صورة):</label>
                <input type="text" id="editLogo" placeholder="ضع رابط صورة اللوجو هنا">
            </div>
        </div>
        
        <div style="max-width: 800px; margin: auto;">
            <button class="btn-apply" onclick="applyChanges()">تحديث المنيو فوراً (Live Update) ✅</button>
        </div>
        
        <p style="text-align: center; margin-top: 20px; color: #666; font-size: 13px;">هذه اللوحة هي ما يراها صاحب المطعم فقط ليتحكم في موقعه.</p>
    </div>

    <script>
        function applyChanges() {
            // سحب البيانات من لوحة التحكم
            const name = document.getElementById('editName').value;
            const slogan = document.getElementById('editSlogan').value;
            const price1 = document.getElementById('editPrice1').value;
            const price2 = document.getElementById('editPrice2').value;
            const logo = document.getElementById('editLogo').value;

            // تحديث واجهة الزبون فوراً
            document.getElementById('viewName').innerText = name;
            document.getElementById('viewSlogan').innerText = slogan;
            document.getElementById('viewPrice1').innerText = price1 + "ج";
            document.getElementById('viewPrice2').innerText = price2 + "ج";
            
            if(logo) {
                document.getElementById('viewLogo').src = logo;
            }

            alert("تم تحديث المنيو بنجاح! يمكن للزبائن الآن رؤية التعديلات.");
        }
    </script>
</body>
</html>
