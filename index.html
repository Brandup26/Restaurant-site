<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أولاد أنس المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f27e27; --dark: #0f0f0f; --card: #1a1a1a; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: var(--white); overflow-x: hidden; }

        /* واجهة الزبون */
        .client-view { padding-bottom: 100px; background: var(--dark); }
        header { text-align: center; padding: 30px 15px; border-bottom: 2px solid var(--primary); }
        .logo-box { width: 90px; height: 90px; background: #fff; border-radius: 50%; margin: 0 auto 15px; overflow: hidden; border: 3px solid var(--primary); }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .menu-list { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .menu-card { 
            background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; cursor: pointer; transition: 0.2s;
        }
        .menu-card:active { transform: scale(0.95); border-color: var(--primary); }
        .price-tag { color: var(--primary); font-weight: 900; font-size: 20px; }

        /* سلة الطلبات */
        .order-bar { 
            position: fixed; bottom: 0; width: 100%; background: #25d366; color: white;
            padding: 15px; text-align: center; font-weight: 900; cursor: pointer;
            display: none; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        /* لوحة التحكم - إصلاح مشكلة الشمال */
        .admin-view { background: #f4f4f4; color: #333; padding: 25px 15px; border-top: 5px solid var(--primary); }
        .admin-card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; width: 100%; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { 
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; 
            font-size: 16px; text-align: right; display: block;
        }
        .save-btn { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 8px; font-weight: 900; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="client-view">
        <header>
            <div class="logo-box"><img id="viewLogo" src="https://via.placeholder.com/100" alt="Logo"></div>
            <h1 id="viewName">أولاد الحاج أنس</h1>
            <p id="viewSlogan" style="color:#888">أجمد كشري وطواجن في مصر</p>
        </header>

        <div class="menu-list">
            <div class="menu-card" onclick="addToOrder('كشري مخصوص', document.getElementById('price1').innerText)">
                <span style="font-weight:bold">كشري مخصوص</span>
                <span class="price-tag"><span id="price1">45</span>ج</span>
            </div>
            <div class="menu-card" onclick="addToOrder('طاجن الفرن', document.getElementById('price2').innerText)">
                <span style="font-weight:bold">طاجن الفرن</span>
                <span class="price-tag"><span id="price2">100</span>ج</span>
            </div>
        </div>
    </div>

    <div class="admin-view">
        <div class="admin-card">
            <h2 style="text-align:center; color:var(--primary); margin-bottom:20px">⚙️ لوحة الإدارة</h2>
            
            <div class="input-group">
                <label>اسم المطعم (البراند):</label>
                <input type="text" id="editName" value="أولاد الحاج أنس">
            </div>
            <div class="input-group">
                <label>رقم الواتساب (بدون أصفار):</label>
                <input type="tel" id="editPhone" value="01003800314">
            </div>
            <div class="input-group">
                <label>سعر الكشري:</label>
                <input type="number" id="editP1" value="45">
            </div>
            <div class="input-group">
                <label>سعر الطاجن:</label>
                <input type="number" id="editP2" value="100">
            </div>
            <div class="input-group">
                <label>لوجو المطعم (رفع ملف):</label>
                <input type="file" id="editFile" accept="image/*" onchange="updateLogo(event)">
            </div>

            <button class="save-btn" onclick="applyChanges()">حفظ وتحديث المنيو ✅</button>
        </div>
    </div>

    <div class="order-bar" id="orderBar" onclick="sendOrder()">
        إرسال الطلب للواتساب (الإجمالي: <span id="total">0</span> ج)
    </div>

    <script>
        let currentOrder = [];
        let totalPrice = 0;

        function updateLogo(event) {
            const reader = new FileReader();
            reader.onload = function(e) { document.getElementById('viewLogo').src = e.target.result; }
            reader.readAsDataURL(event.target.files[0]);
        }

        function applyChanges() {
            document.getElementById('viewName').innerText = document.getElementById('editName').value;
            document.getElementById('price1').innerText = document.getElementById('editP1').value;
            document.getElementById('price2').innerText = document.getElementById('editP2').value;
            alert("تم التحديث! جرب تضغط على الأصناف فوق لطلبها.");
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function addToOrder(name, price) {
            currentOrder.push(name);
            totalPrice += parseInt(price);
            document.getElementById('orderBar').style.display = 'block';
            document.getElementById('total').innerText = totalPrice;
        }

        function sendOrder() {
            const phone = document.getElementById('editPhone').value;
            const name = document.getElementById('viewName').innerText;
            const msg = `*طلب جديد من ${name}*%0A*الطلبات:* ${currentOrder.join(' + ')}%0A*الإجمالي:* ${totalPrice} جنيه`;
            window.open(`https://wa.me/2${phone}?text=${msg}`);
        }
    </script>
</body>
</html>
