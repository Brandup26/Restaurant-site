<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشري أولاد زكريا</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #121212; --card: #1e1e1e; --white: #fff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: var(--white); margin: 0; padding-bottom: 100px; }
        header { text-align: center; padding: 30px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--gold); }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .category-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 10px; margin: 20px 0; }
        .item { background: var(--card); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #333; }
        .add-btn { background: var(--gold); border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #cart-icon { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--gold); color: black; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; z-index: 1000; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 15px; width: 85%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .checkout-btn { width: 100%; background: var(--gold); padding: 12px; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" class="logo">
        <h1 style="color:var(--gold)">أولاد زكريا</h1>
    </header>

    <div class="container" id="menu">جاري التحميل...</div>

    <div id="cart-icon" onclick="openOrderModal()">🛒 عرض السلة والطلب (<span id="cart-total">0</span> ج)</div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3 style="color:var(--gold)">بيانات التوصيل</h3>
            <input type="text" id="name" placeholder="الاسم">
            <input type="text" id="phone" placeholder="رقم التليفون">
            <input type="text" id="address" placeholder="العنوان">
            <button class="checkout-btn" onclick="sendWhatsApp()">إرسال واتساب 💬</button>
            <button onclick="closeOrderModal()" style="background:none; border:none; color:grey; width:100%; margin-top:15px;">إغلاق</button>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn6BL0A5IgV6qIS2p6lAvYx8VNcTD_0f2WMiBgQJV9uDtEbHUH8Ok_eiJt0xdNiMIKh8FPhCWTF9LP/pub?output=csv';
        let cart = [];
        let total = 0;

        // --- الحل النهائي والقطعي لزرار الرجوع ---
        function openOrderModal() {
            if(cart.length === 0) return alert("السلة فارغة!");
            document.getElementById('orderModal').style.display = 'flex';
            // بنضيف "كلمة" في الرابط عشان المتصفح يحس إنه دخل صفحة جديدة
            window.location.hash = "order"; 
        }

        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
            if(window.location.hash === "#order") {
                history.replaceState(null, null, " "); // بنشيل الكلمة من الرابط
            }
        }

        // لو المستخدم داس زرار الرجوع بتاع الموبايل
        window.onhashchange = function() {
            if (!window.location.hash || window.location.hash !== "#order") {
                document.getElementById('orderModal').style.display = 'none';
            }
        };
        // ---------------------------------------

        async function init() {
            try {
                const res = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(csvUrl));
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                let html = '';
                rows.forEach(row => {
                    const [cat, name, price] = row.split(',');
                    if(name) html += `<div class="item"><span>${name} (${price} ج)</span><button class="add-btn" onclick="add('${name}',${price})">+</button></div>`;
                });
                document.getElementById('menu').innerHTML = html;
            } catch (e) { document.getElementById('menu').innerHTML = "خطأ في التحميل"; }
        }

        function add(n, p) {
            cart.push({n, p});
            total += parseInt(p);
            document.getElementById('cart-total').innerText = total;
        }

        function sendWhatsApp() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const a = document.getElementById('address').value;
            if(!n || !p || !a) return alert("اكمل البيانات");
            let msg = `طلب جديد:%0A` + cart.map(i => i.n).join('%0A') + `%0Aالإجمالي: ${total} ج%0Aالاسم: ${n}%0Aالعنوان: ${a}`;
            window.open(`https://wa.me/201003800314?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
