<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم صاحب المطعم</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; text-align: right; }
        .admin-box { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #2ecc71; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        .save-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; margin-top: 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>تعديل بيانات المطعم</h2>
    
    <label>اسم المطعم المكتوب للزبائن:</label>
    <input type="text" id="storeName" value="أولاد زكريا">

    <label>رقم الواتساب لاستقبال الطلبات:</label>
    <input type="text" id="storePhone" value="01022101718">

    <label>تعديل سعر (كشري جامبو):</label>
    <input type="number" id="itemPrice" value="45">

    <button class="save-btn" onclick="saveData()">حفظ التعديلات الآن ✅</button>
</div>

<script>
    function saveData() {
        const name = document.getElementById('storeName').value;
        const price = document.getElementById('itemPrice').value;
        alert("تم الحفظ بنجاح! \n الآن اسم المطعم: " + name + "\n سعر الكشري أصبح: " + price + "ج");
        // هنا في الحقيقة بنبعت البيانات دي لقاعدة البيانات
    }
</script>

</body>
</html>
