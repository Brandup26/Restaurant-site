<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .admin-card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 12px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .add-btn { background: #34a853; margin-top: 10px; }
        .add-btn:hover { background: #2d8e47; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>⚙️ إعدادات المنصة</h2>

    <div class="section">
        <label>اسم المطعم</label>
        <input type="text" id="resName" placeholder="مثال: مطعم الميدان">
        
        <label>رابط اللوجو (URL)</label>
        <input type="text" id="resLogo" placeholder="ضع رابط الصورة هنا">
        
        <label>رقم واتساب الطلبات</label>
        <input type="text" id="resWhatsapp" placeholder="2010xxxxxxxx">
        
        <button onclick="saveBasicInfo()">حفظ البيانات الأساسية</button>
    </div>

    <div class="section">
        <h3>🍔 إضافة صنف جديد</h3>
        <input type="text" id="itemName" placeholder="اسم الأكلة">
        <input type="number" id="itemPrice" placeholder="السعر">
        <button class="add-btn" onclick="addNewItem()">إضافة الصنف للمنيو</button>
    </div>

    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // حفظ الاسم واللوجو والواتساب
    function saveBasicInfo() {
        const name = document.getElementById('resName').value;
        const logo = document.getElementById('resLogo').value;
        const whatsapp = document.getElementById('resWhatsapp').value;

        db.ref('restaurant_info').update({
            name: name,
            logo: logo,
            whatsapp: whatsapp
        }).then(() => {
            document.getElementById('status').innerText = "✅ تم حفظ البيانات الأساسية!";
        });
    }

    // إضافة صنف جديد للمنيو
    function addNewItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;

        if (name && price) {
            db.ref('menu_items').push({
                name: name,
                price: price
            }).then(() => {
                document.getElementById('status').innerText = "✅ تم إضافة " + name + " للمنيو!";
                document.getElementById('itemName').value = "";
                document.getElementById('itemPrice').value = "";
            });
        } else {
            alert("برجاء إدخال الاسم والسعر");
        }
    }
</script>

</body>
</html>
