<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أولاد زكريا للكشري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #121212; --card: #1e1e1e; --white: #fff; }
        
        /* التعديل هنا: زودنا padding-bottom للجسم كله عشان الصفحة تطلع لفوق براحتها */
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: var(--white); margin: 0; padding: 0; padding-bottom: 120px; }
        
        header { text-align: center; padding: 40px 20px; }
        .logo { width: 200px; height: 200px; border-radius: 20px; border: 3px solid var(--gold); object-fit: cover; }
        h1 { color: var(--gold); margin-top: 15px; font-size: 2rem; }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        .category-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 15px; margin: 30px 0; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .item { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .add-btn { background: var(--gold); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #cart-icon { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: black; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button.checkout-btn { width: 100%; background: var(--gold); padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        footer { text-align: center; padding: 20px; border-top: 1px solid #333; margin-top: 40px; }
        .address { color: #ccc; margin-bottom: 10px; }
        .designer { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="Logo" class="logo">
        <h1>أولاد زكريا للكشري</h1>
    </header>

    <div class="container" id="menu">جاري تحميل القائمة...</div>

    <footer>
        <p class="address">📍 العنوان: أبو المطامير - كوبري خميس</p>
        <p class="designer">Designed by Eng / Anas Gaber Shehata</p>
    </footer>

    <div id="cart-icon" onclick="showModal()">🛒 السلة: <span id="cart-total">0 ج</span></div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h3>بيانات التوصيل</h3>
            <input type="text" id="name" placeholder="الاسم">
            <input type="text" id="phone" placeholder="رقم التليفون">
            <input type="text" id="address" placeholder="العنوان بالتفصيل">
            <button class="checkout-btn" onclick="sendWhatsApp()">إرسال الطلب عبر واتساب</button>
            <button onclick="document.getElementById('orderModal').style.display='none'" style="background:none; border:none; color:red; margin-top:10px; width:100%; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSn6BL0A5IgV6qIS2p6lAvYx8VNcTD_0f2WMiBgQJV9uDtEbHUH8Ok_eiJt0xdNiMIKh8FPhCWTF9LP/pub?output=csv';
        let cart = [];
        let totalSum = 0;

        async function initMenu() {
            const container = document.getElementById('menu');
            try {
                const response = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(csvUrl));
                if (!response.ok) throw new Error("فشل الاتصال بملف البيانات");
                
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                let menuData = [];
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length < 3) return;
                    
                    const category = cols[0].trim();
                    const name = cols[1].trim();
                    const price = parseInt(cols[2].trim());
                    
                    if (!category || !name || isNaN(price)) return;

                    let catObj = menuData.find(c => c.category === category);
                    if (!catObj) {
                        catObj = { category: category, items: [] };
                        menuData.push(catObj);
                    }
                    catObj.items.push({ name: name, price: price });
                });
                renderMenu(menuData);
            } catch (e) {
                container.innerHTML = "<h3 style='color:red'>خطأ في تحميل القائمة: " + e.message + "</h3>";
            }
        }

        function renderMenu(menuItems) {
            const container = document.getElementById('menu');
            container.innerHTML = ""; 
            menuItems.forEach(cat => {
                container.innerHTML += `<h2 class="category-title">${cat.category}</h2><div class="menu-grid" id="${cat.category}"></div>`;
                const grid = document.getElementById(cat.category);
                cat.items.forEach(item => {
                    grid.innerHTML += `<div class="item"><span>${item.name} (${item.price} ج)</span><button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+</button></div>`;
                });
            });
        }

        function addToCart(name, price) {
            cart.push({name, price});
            totalSum += price;
            document.getElementById('cart-total').innerText = totalSum + " ج";
        }

        function showModal() {
            if(cart.length === 0) return alert("السلة فارغة!");
            document.getElementById('orderModal').style.display = 'flex';
        }

        function sendWhatsApp() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let address = document.getElementById('address').value;
            if(!name || !phone || !address) return alert("يرجى ملء جميع البيانات");
            let orderList = cart.map(i => i.name + " - " + i.price + " ج").join("%0A");
            let message = `*طلب جديد من مطعم أولاد زكريا*%0A%0A*الطلبات:*%0A${orderList}%0A%0A*الإجمالي:* ${totalSum} ج%0A%0A*بيانات العميل:*%0Aالاسم: ${name}%0Aالتليفون: ${phone}%0Aالعنوان: ${address}`;
            window.open(`https://wa.me/201003800314?text=${message}`, '_blank');
        }

        initMenu();
    </script>
</body>
</html>
