<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المطعم</title>
    <style>
        :root { --blue: #1a73e8; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--blue); margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إعدادات المطعم</h2>
    <label>اسم المطعم</label>
    <input type="text" id="name" placeholder="مطعم الميدان اللبناني">
    <label>رقم واتساب الطلبات</label>
    <input type="text" id="whatsapp" placeholder="01003800314">
    <label>لوجو المطعم (من المعرض)</label>
    <input type="file" id="fileInput" accept="image/*">
    <hr>
    <button onclick="saveAll()">تحديث المنيو الآن</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAyi3bQqd55atTlULXRTRm5HOuwJthlDaI",
        authDomain: "restaurant-menu-1bfd7.firebaseapp.com",
        databaseURL: "https://restaurant-menu-1bfd7-default-rtdb.firebaseio.com",
        projectId: "restaurant-menu-1bfd7",
        storageBucket: "restaurant-menu-1bfd7.firebasestorage.app",
        messagingSenderId: "626018942432",
        appId: "1:626018942432:web:0e0169b3c071867b713f85"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function saveAll() {
        const file = document.getElementById('fileInput').files[0];
        const status = document.getElementById('status');
        let logoUrl = "";

        status.innerText = "⏳ جاري رفع الصورة وحفظ البيانات...";
        status.style.color = "orange";

        try {
            // رفع الصورة لموقع ImgBB
            if (file) {
                const formData = new FormData();
                formData.append("image", file);
                // مفتاح جديد تماماً وشغال
                const res = await fetch("https://api.imgbb.com/1/upload?key=6f8905e324c538a4208e67f08d32788e", {
                    method: "POST",
                    body: formData
                });
                const json = await res.json();
                logoUrl = json.data.url;
            }

            // حفظ البيانات في Firebase
            await db.ref('myRestaurant').update({
                name: document.getElementById('name').value,
                whatsapp: document.getElementById('whatsapp').value,
                logo: logoUrl
            });

            status.innerText = "✅ تم التحديث بنجاح!";
            status.style.color = "green";
        } catch (e) {
            status.innerText = "❌ فشل الاتصال.. جرب مرة ثانية";
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
